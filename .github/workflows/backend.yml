name: Backend CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Cancel in-progress runs on the same ref when newer commits land —
# saves CI minutes when we push a rapid series of fixes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # protect against a hung test eating an hour of CI minutes

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aegis_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.11  # pinned (was 'latest' — risk of upstream-breaking-change)
        ports:
          - 7700:7700
        env:
          MEILI_MASTER_KEY: masterKey
          MEILI_NO_ANALYTICS: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Enable pgvector extension on test database
      env:
        PGPASSWORD: password
      run: |
        psql -h localhost -U postgres -d aegis_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: Lint with Ruff
      run: ruff check .

    - name: Type check with Mypy
      continue-on-error: true
      run: mypy .

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/aegis_test
        REDIS_URL: redis://localhost:6379/0
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
        MEILI_URL: http://localhost:7700
        MEILI_MASTER_KEY: masterKey
        # Force empty so the embedding-dim startup health check skips the API call
        # instead of attempting real Gemini if the repo secret is set.
        GEMINI_API_KEY: ""
        ENV: test
      run: pytest
